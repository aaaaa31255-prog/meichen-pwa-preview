<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="美辰 GitHub版">
<meta name="application-name" content="美辰 GitHub版">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json?v=mc-exact-img-v1">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=mc-exact-img-v1">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=mc-exact-img-v1">
<title>美辰 GitHub版</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:linear-gradient(180deg,#f7f8fc,#eef1f7);color:#151922}.login{min-height:100vh;padding:max(54px,env(safe-area-inset-top)) 22px calc(104px + env(safe-area-inset-bottom));display:flex;justify-content:center}.panel{width:min(440px,100%);text-align:center;padding-top:84px}.logo{width:116px;height:116px;border-radius:30px;object-fit:cover;display:block;margin:0 auto;background:#fff;box-shadow:0 18px 46px rgba(20,25,35,.22)}.title{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:24px 0 66px}.field{height:68px;border-radius:999px;background:#fff;margin:20px 0;display:flex;align-items:center;gap:16px;padding:0 22px;box-shadow:0 12px 34px rgba(20,25,35,.055)}.field .ico{width:28px;text-align:center;color:#aeb3bd;font-size:21px}.field input{border:0;outline:0;background:transparent;flex:1;min-width:0;font-size:20px;color:#333}.field input::placeholder{color:#c6cad3}.clear{font-size:26px;color:#aaa}.btn{width:100%;height:70px;border:0;border-radius:999px;background:#f56398;color:#fff;font-size:22px;margin:28px 0 14px;box-shadow:0 14px 30px rgba(245,99,152,.25)}.links{display:flex;justify-content:space-between;font-size:16px;color:#b4b9c4}.links .pink{color:#f56398}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;height:calc(74px + env(safe-area-inset-bottom));padding:8px 6px calc(12px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.96);border-top:1px solid #e9edf4}.tabs button{border:0;background:transparent;border-radius:16px;font-size:13px;color:#777}.tabs button.active{background:#f3eade;color:#8a5627;font-weight:800}
</style>
</head>
<body>
<section class="login">
  <div class="panel">
    <img class="logo" src="apple-touch-icon.png?v=mc-exact-img-v1" alt="美辰 MC 图标">
    <div class="title">美辰 Beauty AI</div>
    <div class="field"><span class="ico">▯</span><input inputmode="tel" placeholder="请输入注册手机号"></div>
    <div class="field"><span class="ico">♙</span><input value="boss"><span class="clear">×</span></div>
    <div class="field"><span class="ico">▣</span><input type="password" placeholder="请输入密码"><span class="clear">◦</span></div>
    <button class="btn">登录</button>
    <div class="links"><span>忘记密码?</span><span class="pink">商家注册</span></div>
  </div>
</section>
<nav class="tabs"><button class="active">首页</button><button>客户</button><button>诊断</button><button>方案</button><button>库存</button></nav>
</body>
</html>
