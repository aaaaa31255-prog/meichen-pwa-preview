<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="美辰">
<meta name="application-name" content="美辰 Beauty AI">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="./manifest.json?v=wb16-4-public-shell-20260524-06">
<link rel="apple-touch-icon" href="./apple-touch-icon.png?v=wb16-4-public-shell-20260524-06">
<link rel="icon" type="image/png" href="./apple-touch-icon.png?v=wb16-4-public-shell-20260524-06">
<title>美辰 Beauty AI</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:linear-gradient(160deg,#111,#3a2417 48%,#f4e8dc);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(430px,100%);border-radius:30px;background:rgba(255,255,255,.13);backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.28);padding:28px;text-align:center;border:1px solid rgba(255,255,255,.22)}.logo{width:118px;height:118px;border-radius:28px;margin:0 auto 18px;display:grid;place-items:center;background:conic-gradient(#ff2d72,#ff7a18,#f8e71c,#19d45b,#1587ff,#7b2cff,#ff2d72);box-shadow:0 18px 42px rgba(0,0,0,.28);position:relative;overflow:hidden}.logo:before{content:"";position:absolute;inset:22px;border-radius:50%;background:#111}.logo b{position:relative;z-index:1;font-size:42px;letter-spacing:-1px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.35)}h1{font-size:30px;line-height:1.2;margin:10px 0 8px}.ver{display:inline-block;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.22);font-size:13px;margin:8px 0 18px}.msg{line-height:1.75;font-size:16px;color:rgba(255,255,255,.92);margin:0 0 18px}.btn{display:block;width:100%;border:0;border-radius:18px;background:#fff;color:#3a2417;font-weight:900;font-size:18px;padding:16px;margin-top:14px;text-decoration:none}.btn:active{transform:scale(.985)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.box{border-radius:18px;background:rgba(255,255,255,.16);padding:13px 10px;font-size:13px}.box b{display:block;font-size:18px;margin-bottom:3px}.foot{font-size:12px;color:rgba(255,255,255,.75);margin-top:18px;line-height:1.6;text-align:left}.safe{color:#d7ffdf;font-weight:800}.status{font-size:13px;line-height:1.6;color:#e6ffeb;min-height:22px;margin:10px 0 0}
</style>
</head>
<body>
<main class="card">
  <div class="logo"><b>MC</b></div>
  <h1>美辰 Beauty AI</h1>
  <div class="ver">WB16.4 Public Shell · 06</div>
  <p class="msg">这是手机桌面公开入口壳。完整 WB17 私有核心、配方逻辑、色板规则、客户/会员/库存模块继续保存在私有仓库，不在公开页面暴露。</p>
  <button class="btn" id="refreshBtn" type="button">强制刷新公开入口</button>
  <div class="status" id="statusText">如果刚更新后没变化，点上方按钮会清理旧缓存再重新打开。</div>
  <div class="grid"><div class="box"><b>✓</b>桌面入口</div><div class="box"><b>✓</b>Logo 壳</div><div class="box"><b>🔒</b>核心私有</div><div class="box"><b>WB17</b>继续开发</div></div>
  <div class="foot"><span class="safe">安全边界：</span>公开仓库只放入口、Logo、版本说明和非核心壳；完整系统继续在私有仓库开发。当前不走快捷指令，不要求重新添加桌面图标。</div>
</main>
<script>
(function(){
  var VERSION = 'wb16-4-public-shell-20260524-06';
  var statusText = document.getElementById('statusText');
  function setStatus(text){ if(statusText){ statusText.textContent = text; } }
  function cacheBustReload(){
    var nextUrl = './?v=' + VERSION + '-' + Date.now();
    window.location.replace(nextUrl);
  }
  async function clearAndReload(){
    setStatus('正在清理旧缓存，请等 1-3 秒...');
    try{
      if('serviceWorker' in navigator){
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){ return r.unregister(); }));
      }
    }catch(e){}
    try{
      if(window.caches){
        var keys = await caches.keys();
        await Promise.all(keys.map(function(k){ return caches.delete(k); }));
      }
    }catch(e){}
    setStatus('缓存已清理，正在重新打开...');
    setTimeout(cacheBustReload, 350);
  }
  var btn = document.getElementById('refreshBtn');
  if(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault();
      clearAndReload();
    }, {passive:false});
    btn.addEventListener('touchend', function(e){
      e.preventDefault();
      clearAndReload();
    }, {passive:false});
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./service-worker.js?v=' + VERSION).catch(function(){});
  }
})();
</script>
</body>
</html>
